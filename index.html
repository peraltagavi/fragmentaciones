:root {
  --bg:      #f4f1ea;
  --bg2:     #ede9e0;
  --ink:     #1a1a24;
  --ink2:    #44445a;
  --ink3:    #888899;
  --rule:    rgba(26,26,36,0.08);
  --cartel:  #c0240c;
  --evento:  #d4780a;
  --frag:    #1a6b3a;
  --frag2:   #2a8a50;
  --internal:#4466bb;
  --murder:  #8b0000;
  --death:   #555577;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Barlow Condensed', sans-serif;
  width: 100%; height: 100%;
  overflow: hidden;
}

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 2px solid var(--ink);
  padding: 10px 24px 8px;
  display: flex; align-items: flex-end; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
}

.title-block h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.3rem, 2.5vw, 1.9rem);
  letter-spacing: 0.06em;
  color: var(--ink);
  line-height: 1;
}
.title-block h1 span { color: var(--cartel); }
.title-block p {
  font-family: 'DM Mono', monospace;
  font-size: 0.52rem;
  color: var(--ink3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 2px;
}

.legend {
  display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
}
.li {
  display: flex; align-items: center; gap: 5px;
  font-family: 'DM Mono', monospace;
  font-size: 0.52rem; color: var(--ink2);
  text-transform: uppercase; letter-spacing: 0.07em;
}
.lsym { flex-shrink: 0; }

/* ── CONTROLS ── */
#controls {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 99;
  background: rgba(244,241,234,0.97);
  border-bottom: 1px solid rgba(26,26,36,0.12);
  padding: 4px 24px;
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
/* header takes ~58px, controls strip takes ~32px — positioned via JS */

.cb {
  background: none;
  border: 1px solid rgba(26,26,36,0.2);
  color: var(--ink2);
  padding: 3px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 0.52rem; letter-spacing: 0.06em;
  cursor: pointer; transition: all 0.15s;
  text-transform: uppercase;
}
.cb:hover { border-color: var(--ink); color: var(--ink); }
.cb.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }

.cb-fam {
  background: none;
  border: 1px solid rgba(26,26,36,0.15);
  padding: 3px 8px;
  font-family: 'DM Mono', monospace;
  font-size: 0.5rem; letter-spacing: 0.05em;
  cursor: pointer; transition: all 0.15s;
  text-transform: uppercase;
  color: var(--ink2);
}
.cb-fam:hover { opacity: 0.8; }
.cb-fam.on { color: #fff; }

.sep { width: 1px; height: 16px; background: rgba(26,26,36,0.15); }

/* ── CANVAS WRAPPER ── */
#wrap {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  overflow: auto;
  background: var(--bg);
}

/* ── SVG ── */
#chart { display: block; }

/* Node labels */
.node-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  letter-spacing: 0.02em;
  pointer-events: none;
}
.node-label.cartel {
  font-size: 11px;
  font-weight: 700;
  fill: var(--cartel);
}
.node-label.frag {
  font-size: 9.5px;
  font-weight: 500;
  fill: var(--frag);
}

/* ── TOOLTIP ── */
#tooltip {
  position: fixed;
  background: var(--ink);
  color: var(--bg);
  padding: 10px 14px;
  pointer-events: none;
  z-index: 999;
  max-width: 260px;
  opacity: 0;
  transition: opacity 0.1s;
  box-shadow: 4px 4px 0 rgba(26,26,36,0.3);
}
#tooltip.on { opacity: 1; }
.tt-t { font-family: 'DM Mono', monospace; font-size: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(244,241,234,0.5); margin-bottom: 3px; }
.tt-n { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.04em; line-height: 1; color: #fff; }
.tt-b { font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; color: rgba(244,241,234,0.75); margin-top: 4px; line-height: 1.5; }
</style>

// ═══════════════════════════════════════════════════════════
// Y POSITION ASSIGNMENT
// Assign explicit Y positions:
//   - Root cartels: anchored at their family band center
//   - Each child: spread below its parent, ordered by year_start then id
// We'll assign a "row index" to each non-event node, then event nodes
// get the Y of their parent.
// ═══════════════════════════════════════════════════════════

// Build id → node map
const nodeMap = {};
nodes.forEach(n => { nodeMap[n.id] = n; });

// Get children of a node (non-event direct children)
function childFragments(parentId) {
  return nodes.filter(n => n.parent === parentId && n.tipo !== "evento");
}
function childEvents(parentId) {
  return nodes.filter(n => n.parent === parentId && n.tipo === "evento");
}

// Flatten in DFS order, skipping events (they get parent's Y)
// Returns array of ids in display order
function dfsOrder(rootId) {
  const result = [];
  function visit(id) {
    const n = nodeMap[id];
    if (!n || n.tipo === "evento") return;
    result.push(id);
    // children: first events' fragment children, then direct fragments
    const evChildren = childEvents(id);
    const fragChildren = childFragments(id);
    // fragments directly parented to events
    evChildren.forEach(ev => {
      const evFrags = childFragments(ev.id);
      evFrags.sort((a,b) => a.year_start - b.year_start);
      evFrags.forEach(f => visit(f.id));
    });
    // fragments directly parented to this node
    fragChildren.sort((a,b) => a.year_start - b.year_start);
    fragChildren.forEach(f => visit(f.id));
  }
  visit(rootId);
  return result;
}

// Families in order
const FAMILY_ROOTS = [
  "Arellano_Felix",
  "Sinaloa",
  "Familia_Michoacana",
  "Milenio",
  "Cartel_Golfo",
  "Union_Tepito",
];

const ROW_H = 22; // px per row
const FAM_GAP = 28; // extra gap between families
const TOP_PAD = 20;

const rowY = {}; // id → Y center
let curRow = 0;
const famBands = []; // { fam, yStart, yEnd, color, label }

FAMILY_ROOTS.forEach((root, fi) => {
  const order = dfsOrder(root);
  const famStart = TOP_PAD + curRow * ROW_H + (fi > 0 ? fi * FAM_GAP : 0);
  order.forEach(id => {
    rowY[id] = TOP_PAD + curRow * ROW_H + fi * FAM_GAP;
    curRow++;
  });
  const famEnd = TOP_PAD + curRow * ROW_H + fi * FAM_GAP;
  const fam = FAMILY[root];
  famBands.push({ fam, yStart: famStart, yEnd: famEnd - ROW_H/2, color: FAM_COLOR[fam], label: FAM_LABEL[fam], root });
});

// Event nodes: Y = parent's Y
nodes.forEach(n => {
  if (n.tipo === "evento") {
    rowY[n.id] = rowY[n.parent] ?? 0;
  }
});

const TOTAL_ROWS = curRow;
const CHART_H_DATA = TOP_PAD + TOTAL_ROWS * ROW_H + FAMILY_ROOTS.length * FAM_GAP + 80;

// Measure header + controls height
function getOffsetTop() {
  const hdr = document.getElementById('header');
  const ctl = document.getElementById('controls');
  return (hdr?.offsetHeight || 58) + (ctl?.offsetHeight || 32);
}

// Filter state
// null = mostrar todos; string = mostrar solo ese
let activeEventFilter = null;   // null | "detention" | "murder" | "death" | "internal"
let activeFamilyFilter = null;  // null | fam key

// Derived sets used by drawChart
function getActiveFilters() {
  if (activeEventFilter === null) return new Set(["detention","murder","death","internal"]);
  return new Set([activeEventFilter]);
}
function getActiveFamilies() {
  if (activeFamilyFilter === null) return new Set(FAMILY_ROOTS.map(r => FAMILY[r]));
  return new Set([activeFamilyFilter]);
}

// Build family filter buttons
function buildControls() {
  const ctrl = document.getElementById('controls');
  ctrl.innerHTML = '';

  // ── Event type buttons (exclusive: click activates only that, click again deactivates)
  const types = [
    { key:"detention", label:"Detención",         color:"#d4780a" },
    { key:"murder",    label:"Asesinato",          color:"#a00010" },
    { key:"death",     label:"Muerte",             color:"#555577" },
    { key:"internal",  label:"Conflicto interno",  color:"#4466bb" },
  ];

  const tspan = document.createElement('span');
  tspan.style.cssText = "font-family:'DM Mono',monospace;font-size:0.5rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-right:4px";
  tspan.textContent = 'Evento:';
  ctrl.appendChild(tspan);

  // "Todos" button for event types
  const allEvBtn = document.createElement('button');
  allEvBtn.id = 'btn-ev-all';
  allEvBtn.className = 'cb' + (activeEventFilter === null ? ' on' : '');
  allEvBtn.textContent = 'Todos';
  allEvBtn.onclick = () => {
    activeEventFilter = null;
    syncEventBtns();
    drawChart();
  };
  ctrl.appendChild(allEvBtn);

  types.forEach(t => {
    const b = document.createElement('button');
    b.id = 'btn-ev-' + t.key;
    b.className = 'cb' + (activeEventFilter === t.key ? ' on' : '');
    b.textContent = t.label;
    b.style.borderColor = t.color + '88';
    b.style.setProperty('--ev-color', t.color);
    b.onclick = () => {
      // If already selected → deselect (show all)
      if (activeEventFilter === t.key) {
        activeEventFilter = null;
      } else {
        activeEventFilter = t.key;
      }
      syncEventBtns();
      drawChart();
    };
    ctrl.appendChild(b);
  });

  const sep = document.createElement('div');
  sep.className = 'sep';
  ctrl.appendChild(sep);

  // ── Family buttons (exclusive: click activates only that, click again shows all)
  const fspan = document.createElement('span');
  fspan.style.cssText = "font-family:'DM Mono',monospace;font-size:0.5rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-right:4px";
  fspan.textContent = 'Familia:';
  ctrl.appendChild(fspan);

  // "Todas" button for families
  const allFamBtn = document.createElement('button');
  allFamBtn.id = 'btn-fam-all';
  allFamBtn.className = 'cb' + (activeFamilyFilter === null ? ' on' : '');
  allFamBtn.textContent = 'Todas';
  allFamBtn.onclick = () => {
    activeFamilyFilter = null;
    syncFamilyBtns();
    drawChart();
  };
  ctrl.appendChild(allFamBtn);

  FAMILY_ROOTS.forEach(root => {
    const fam = FAMILY[root];
    const b = document.createElement('button');
    b.id = 'btn-fam-' + fam;
    b.className = 'cb-fam' + (activeFamilyFilter === fam ? ' on' : '');
    b.textContent = FAM_LABEL[fam];
    b.style.borderColor = FAM_COLOR[fam] + 'aa';
    if (activeFamilyFilter === fam) b.style.background = FAM_COLOR[fam];
    b.onclick = () => {
      // If already selected → deselect (show all)
      if (activeFamilyFilter === fam) {
        activeFamilyFilter = null;
      } else {
        activeFamilyFilter = fam;
      }
      syncFamilyBtns();
      drawChart();
    };
    ctrl.appendChild(b);
  });
}

function syncEventBtns() {
  const types = ["detention","murder","death","internal"];
  const allBtn = document.getElementById('btn-ev-all');
  if (allBtn) {
    allBtn.classList.toggle('on', activeEventFilter === null);
  }
  types.forEach(key => {
    const b = document.getElementById('btn-ev-' + key);
    if (!b) return;
    const isOn = activeEventFilter === key;
    b.classList.toggle('on', isOn);
  });
}

function syncFamilyBtns() {
  const allBtn = document.getElementById('btn-fam-all');
  if (allBtn) allBtn.classList.toggle('on', activeFamilyFilter === null);
  FAMILY_ROOTS.forEach(root => {
    const fam = FAMILY[root];
    const b = document.getElementById('btn-fam-' + fam);
    if (!b) return;
    const isOn = activeFamilyFilter === fam;
    b.classList.toggle('on', isOn);
    b.style.background = isOn ? FAM_COLOR[fam] : 'none';
    b.style.color = isOn ? '#fff' : '';
  });
}

// ═══════════════════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════════════════

function drawChart() {
  const offsetTop = getOffsetTop();
  const wrap = document.getElementById('wrap');
  wrap.style.top = offsetTop + 'px';

  const W = Math.max(window.innerWidth, 1100);
  const innerW = W - MARGIN.left - MARGIN.right;
  const innerH = CHART_H_DATA;
  const svgH = innerH + MARGIN.top + MARGIN.bottom;

  const svg = d3.select('#chart')
    .attr('width', W)
    .attr('height', svgH);

  svg.selectAll('*').remove();

  // X scale
  const xScale = d3.scaleLinear()
    .domain([YEAR_S, YEAR_E])
    .range([0, innerW]);

  const g = svg.append('g')
    .attr('transform', `translate(${MARGIN.left},${MARGIN.top})`);

  // ── Background family bands
  const activeFamiliesBands = getActiveFamilies();
  famBands.forEach(fb => {
    if (!activeFamiliesBands.has(fb.fam)) return;
    g.append('rect')
      .attr('x', -MARGIN.left)
      .attr('y', fb.yStart - ROW_H/2 - 4)
      .attr('width', W)
      .attr('height', fb.yEnd - fb.yStart + ROW_H + 8)
      .attr('fill', fb.color)
      .attr('opacity', 0.04);

    // Family label in left margin
    g.append('text')
      .attr('x', -MARGIN.left + 8)
      .attr('y', (fb.yStart + fb.yEnd) / 2)
      .attr('dominant-baseline', 'middle')
      .attr('font-family', "'DM Mono', monospace")
      .attr('font-size', '9px')
      .attr('text-transform', 'uppercase')
      .attr('letter-spacing', '0.08em')
      .attr('fill', fb.color)
      .attr('opacity', 0.7)
      .text(fb.label.toUpperCase())
      .style('text-transform', 'uppercase');
  });

  // ── Grid lines
  const gridG = g.append('g').attr('class','grid');
  for (let y = YEAR_S; y <= YEAR_E; y++) {
    const x = xScale(y);
    gridG.append('line')
      .attr('x1', x).attr('y1', -10)
      .attr('x2', x).attr('y2', innerH + 10)
      .attr('stroke', y % 5 === 0 ? 'rgba(26,26,36,0.1)' : 'rgba(26,26,36,0.04)')
      .attr('stroke-width', y % 5 === 0 ? 1 : 0.5);
  }

  // ── Visible node ids
  const activeFilters = getActiveFilters();
  const activeFamilies = getActiveFamilies();
  const visibleNodeIds = new Set();
  nodes.forEach(n => {
    const fam = FAMILY[n.id];
    if (!fam || !activeFamilies.has(fam)) return;
    if (n.tipo === "evento") {
      const em = EVENT_META[n.id];
      if (em && !activeFilters.has(em.etype)) return;
    }
    // If event filter is active, hide fragment nodes whose origin event doesn't match
    if (n.tipo === "fragmento" && activeEventFilter !== null) {
      const parentNode = nodeMap[n.parent];
      if (parentNode && parentNode.tipo === "evento") {
        const em = EVENT_META[n.parent];
        if (!em || !activeFilters.has(em.etype)) return;
      }
    }
    visibleNodeIds.add(n.id);
  });

  // ── Draw horizontal timeline lines (duration bars)
  const linesG = g.append('g').attr('class','lines');
  nodes.forEach(n => {
    if (n.tipo === "evento") return;
    if (!visibleNodeIds.has(n.id)) return;
    const y = rowY[n.id];
    const x1 = xScale(n.year_start);
    const x2 = xScale(n.year_end ?? YEAR_E);
    const fam = FAMILY[n.id];
    const col = FAM_COLOR[fam] || '#444';

    linesG.append('line')
      .attr('x1', x1).attr('y1', y)
      .attr('x2', x2).attr('y2', y)
      .attr('stroke', col)
      .attr('stroke-width', n.tipo === 'cartel' ? 3.5 : 2)
      .attr('stroke-opacity', n.tipo === 'cartel' ? 0.85 : 0.6)
      .attr('stroke-linecap', 'round');
  });

  // ── Draw fragmentation connector lines
  // For each event node: line from parent timeline → event → fragment start node
  const connG = g.append('g').attr('class','connectors');
  nodes.forEach(ev => {
    if (ev.tipo !== "evento") return;
    if (!visibleNodeIds.has(ev.id)) return;
    const em = EVENT_META[ev.id];
    if (!em) return;
    const col = EC[em.etype] || '#888';
    const evX = xScale(em.year);
    const evY = rowY[ev.parent];

    // Get fragment children of this event
    const fragChildren = nodes.filter(n => n.parent === ev.id && n.tipo === "fragmento");
    fragChildren.forEach(fc => {
      if (!visibleNodeIds.has(fc.id)) return;
      const fcY = rowY[fc.id];
      const fcX = xScale(fc.year_start);

      // Diagonal connector: from (evX, evY) to (fcX, fcY)
      connG.append('line')
        .attr('x1', evX).attr('y1', evY)
        .attr('x2', fcX).attr('y2', fcY)
        .attr('stroke', col)
        .attr('stroke-width', 1.2)
        .attr('stroke-opacity', 0.65)
        .attr('stroke-dasharray', em.etype === 'detention' ? 'none' : '4,2');
    });
  });

  // ── Draw event nodes (diamonds)
  const eventsG = g.append('g').attr('class','event-nodes');
  nodes.forEach(ev => {
    if (ev.tipo !== "evento") return;
    if (!visibleNodeIds.has(ev.id)) return;
    const em = EVENT_META[ev.id];
    if (!em) return;
    const col = EC[em.etype] || '#888';
    const x = xScale(em.year);
    const y = rowY[ev.parent];
    const s = 5; // half-size of diamond

    const evG = eventsG.append('g')
      .attr('transform', `translate(${x},${y})`)
      .style('cursor', 'pointer');

    evG.append('polygon')
      .attr('points', `0,${-s} ${s},0 0,${s} ${-s},0`)
      .attr('fill', col)
      .attr('stroke', 'white')
      .attr('stroke-width', 0.8)
      .attr('opacity', 0.9);

    evG
      .on('mouseenter', (e) => showTT(e, 'evento', ev.id, em))
      .on('mousemove', moveTT)
      .on('mouseleave', hideTT);
  });

  // ── Draw cartel + fragment nodes (circles)
  const nodesG = g.append('g').attr('class','main-nodes');
  nodes.forEach(n => {
    if (n.tipo === "evento") return;
    if (!visibleNodeIds.has(n.id)) return;
    const y = rowY[n.id];
    const x = xScale(n.year_start);
    const fam = FAMILY[n.id];
    const col = FAM_COLOR[fam] || '#444';
    const r = n.tipo === 'cartel' ? 7 : 5;
    const meta = NODE_META[n.id];

    const ng = nodesG.append('g')
      .attr('transform', `translate(${x},${y})`)
      .style('cursor', 'pointer');

    // Drop shadow for cartels
    if (n.tipo === 'cartel') {
      ng.append('circle')
        .attr('r', r + 2)
        .attr('fill', col)
        .attr('opacity', 0.18)
        .attr('cx', 1).attr('cy', 1);
    }

    ng.append('circle')
      .attr('r', r)
      .attr('fill', n.tipo === 'cartel' ? col : 'white')
      .attr('stroke', col)
      .attr('stroke-width', n.tipo === 'cartel' ? 0 : 1.8)
      .attr('opacity', 0.92);

    // Inner dot for fragments
    if (n.tipo === 'fragmento') {
      ng.append('circle')
        .attr('r', 2)
        .attr('fill', col)
        .attr('opacity', 0.7);
    }

    ng
      .on('mouseenter', (e) => showTT(e, n.tipo, n.id, null))
      .on('mousemove', moveTT)
      .on('mouseleave', hideTT);
  });

  // ── Labels for non-event nodes
  const labelsG = g.append('g').attr('class','labels');
  nodes.forEach(n => {
    if (n.tipo === "evento") return;
    if (!visibleNodeIds.has(n.id)) return;
    const y = rowY[n.id];
    const x = xScale(n.year_start);
    const meta = NODE_META[n.id];
    if (!meta) return;
    const fam = FAMILY[n.id];
    const col = FAM_COLOR[fam] || '#444';
    const r = n.tipo === 'cartel' ? 7 : 5;

    labelsG.append('text')
      .attr('x', x + r + 4)
      .attr('y', y)
      .attr('dominant-baseline', 'middle')
      .attr('font-family', "'Barlow Condensed', sans-serif")
      .attr('font-size', n.tipo === 'cartel' ? '11px' : '9.5px')
      .attr('font-weight', n.tipo === 'cartel' ? '700' : '500')
      .attr('fill', col)
      .attr('opacity', n.tipo === 'cartel' ? 1 : 0.85)
      .text(meta.label);
  });

  // ── X Axis
  const axisG = g.append('g')
    .attr('transform', `translate(0, ${innerH + 20})`);

  const axis = d3.axisBottom(xScale)
    .tickValues(d3.range(YEAR_S, YEAR_E + 1))
    .tickFormat(d => String(d))
    .tickSize(6);

  axisG.call(axis);

  axisG.select('.domain')
    .attr('stroke', 'rgba(26,26,36,0.3)')
    .attr('stroke-width', 1.5);

  axisG.selectAll('.tick line')
    .attr('stroke', 'rgba(26,26,36,0.25)');

  axisG.selectAll('.tick text')
    .attr('font-family', "'DM Mono', monospace")
    .attr('font-size', '10px')
    .attr('fill', 'var(--ink2)')
    .attr('letter-spacing', '0.04em');

  // ── Left margin: sticky labels for nodes not easily readable
  // (We position labels with x offset already; this is handled above)

  // ── Attribution
  g.append('text')
    .attr('x', innerW)
    .attr('y', innerH + 48)
    .attr('text-anchor', 'end')
    .attr('font-family', "'DM Mono', monospace")
    .attr('font-size', '8px')
    .attr('fill', 'var(--ink3)')
    .text('Efecto Kingpin · Fragmentación del Crimen Organizado · 2005–2024');
}

// ═══════════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════════
const ttEl = document.getElementById('tooltip');
const ETYPE_LABEL = { detention:"Detención", murder:"Asesinato", death:"Muerte", internal:"Conflicto interno" };

function showTT(e, tipo, id, evMeta) {
  const t = document.getElementById('tt-t');
  const n = document.getElementById('tt-n');
  const b = document.getElementById('tt-b');

  if (tipo === 'evento' && evMeta) {
    t.textContent = `● EVENTO · ${ETYPE_LABEL[evMeta.etype]?.toUpperCase() || ''}`;
    t.style.color = EC[evMeta.etype] + 'cc';
    n.textContent = evMeta.label;
    b.textContent = `Año: ${evMeta.year}`;
  } else {
    const meta = NODE_META[id];
    const fam = FAMILY[id];
    const col = FAM_COLOR[fam] || '#fff';
    t.style.color = col + 'cc';
    if (tipo === 'cartel') {
      t.textContent = '● CÁRTEL MATRIZ';
      n.textContent = meta?.label || id;
      const nd = nodeMap[id];
      b.textContent = `Activo desde ${nd?.year_start || '?'} · Familia: ${FAM_LABEL[fam] || fam}`;
    } else {
      t.textContent = '● FRAGMENTO';
      n.textContent = meta?.label || id;
      const nd = nodeMap[id];
      // find originating event
      const parentEv = nodes.find(x => x.id === nd?.parent && x.tipo === 'evento');
      const em = parentEv ? EVENT_META[parentEv.id] : null;
      b.innerHTML = `Origen: ${FAMILY[nd?.parent] ? (NODE_META[nd?.parent]?.label || nd?.parent) : '—'}<br>` +
        (em ? `Evento: ${em.label} (${em.year})` : `Año: ${nd?.year_start}`);
    }
  }

  ttEl.classList.add('on');
  moveTT(e);
}
function moveTT(e) {
  const x = e.clientX, y = e.clientY;
  const tw = 260;
  ttEl.style.left = (x + tw + 16 > window.innerWidth ? x - tw - 8 : x + 14) + 'px';
  ttEl.style.top  = (y + 4) + 'px';
}
function hideTT() { ttEl.classList.remove('on'); }

// ═══════════════════════════════════════════════════════════
// INIT + RESIZE
// ═══════════════════════════════════════════════════════════
function positionControls() {
  const hdr = document.getElementById('header');
  document.getElementById('controls').style.top = (hdr.offsetHeight) + 'px';
}

buildControls();
positionControls();
drawChart();
window.addEventListener('resize', () => { positionControls(); drawChart(); });
</script>
